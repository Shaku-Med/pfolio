name: Deploy Portfolio to EC2

# Public site only — never deploys app_admincli.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/portfolio.yml'
  workflow_dispatch:

concurrency:
  group: deploy-pfolio
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  REPO_SLUG: ${{ github.event.repository.name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect app changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.flags.outputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/portfolio.yml'

      - name: Set deploy flag
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.app }}" = "true" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.app == 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.tags.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          OWNER_LC=$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${REPO_SLUG}" | tr '[:upper:]' '[:lower:]')
          BASE="${REGISTRY}/${OWNER_LC}/${REPO_LC}/app"
          echo "image=${BASE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${BASE}:latest" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}
            ${{ steps.tags.outputs.latest }}
          cache-from: type=gha,scope=pfolio-app
          cache-to: type=gha,scope=pfolio-app,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.app == 'true'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create .env from GitHub secret
        run: |
          if [ -n "${{ secrets.ENV_FILE }}" ]; then
            cat << 'EOF' > app/.env
          ${{ secrets.ENV_FILE }}
          EOF
            echo "✅ app/.env created"
          else
            echo "❌ ERROR: ENV_FILE secret is empty!"
            exit 1
          fi

      - name: Copy compose + env to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app/docker-compose.yml,app/.env"
          target: "/var/www/medzy.brozy.org/"
          overwrite: true

      - name: Pull image & restart container
        uses: appleboy/ssh-action@v1
        env:
          APP_IMAGE: ${{ needs.build.outputs.image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_IMAGE,GHCR_USER,GHCR_TOKEN
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/medzy.brozy.org/app

            if ! command -v docker >/dev/null 2>&1; then
              echo "❌ Docker is not installed on this server."; exit 1
            fi

            [ -f .env ] || { echo "❌ .env missing after copy"; exit 1; }
            [ -f docker-compose.yml ] || { echo "❌ docker-compose.yml missing"; exit 1; }

            printf 'APP_IMAGE=%s\n' "$APP_IMAGE" > .env.deploy

            echo "🔑 Logging in to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            echo "🐳 Pulling $APP_IMAGE ..."
            docker compose --env-file .env.deploy pull

            # Stop old PM2 / node portfolio if still around (pre-Docker deploy).
            if command -v pm2 >/dev/null 2>&1; then
              pm2 delete medzy >/dev/null 2>&1 || true
              pm2 delete portfolio >/dev/null 2>&1 || true
              pm2 delete pfolio >/dev/null 2>&1 || true
            fi

            echo "🚀 (Re)starting container..."
            docker compose --env-file .env.deploy up -d --remove-orphans

            docker logout ghcr.io >/dev/null 2>&1 || true
            # -a, not just dangling: each deploy ships a new SHA-tagged image and
            # the old one stays *tagged*, so plain prune -f never reclaims it and
            # they pile up (this shared EC2 already hit 29GB of stale images). -af
            # drops every image no running container uses — the previous deploy's
            # — while the one we just started with `up -d` is protected. Scoped by
            # image, so it doesn't touch Memories' running container either.
            docker image prune -af >/dev/null 2>&1 || true
            docker compose --env-file .env.deploy ps
            echo "✅ Portfolio deployed via GHCR image on 127.0.0.1:3001"
