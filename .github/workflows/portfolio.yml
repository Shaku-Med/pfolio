name: Deploy Portfolio to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Portfolio
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3️⃣ Install & Build (from pfolio/app)
      - name: Install dependencies
        run: npm ci
        working-directory: pfolio/app

      - name: Build
        run: npm run build
        working-directory: pfolio/app

      # 4️⃣ Deploy build to EC2
      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'pfolio/app/build/*'
          target: /var/www/medzy.brozy.org/
          strip_components: 3
          overwrite: true

      # 5️⃣ Confirm deployment
      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📂 Deployed files:"
            ls -lh /var/www/medzy.brozy.org/
            echo "✅ Portfolio deployed successfully"
