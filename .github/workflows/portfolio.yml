name: Deploy Portfolio to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Portfolio
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Create .env file from GitHub secret
      - name: Create .env file
        run: |
          if [ -n "${{ secrets.ENV_FILE }}" ]; then
            cat << 'EOF' > app/.env
          ${{ secrets.ENV_FILE }}
          EOF
            echo "✅ .env file created"
          else
            echo "❌ ERROR: ENV_FILE secret is empty!"
            exit 1
          fi

      # 3️⃣ Deploy full app directory to EC2
      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'app/*'
          target: /var/www/medzy.brozy.org/
          strip_components: 1
          overwrite: true

      # 4️⃣ Confirm deployment
      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📂 Deployed files:"
            ls -lh /var/www/medzy.brozy.org/
            echo "✅ Portfolio deployed successfully"